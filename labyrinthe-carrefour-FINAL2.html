<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛒 Le Labyrinthe Carrefour – CAP EPC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
:root{--blue:#003087;--red:#e5002b;--yellow:#f7c800;--green:#16a34a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#080f20;font-family:'Nunito',sans-serif;}

/* ── HEADER ── */
#hdr{
  height:48px;
  background:linear-gradient(90deg,#001040,#002570,#001040);
  border-bottom:2px solid var(--yellow);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;flex-shrink:0;
}
.logo{font-family:'Fredoka One',cursive;color:var(--yellow);font-size:19px;letter-spacing:.5px;}
.logo span{color:#fff;}
.hud{display:flex;gap:8px;}
.pill{background:rgba(255,255,255,.12);color:#fff;font-weight:800;font-size:12px;padding:3px 12px;border-radius:20px;}
.pill.y{background:var(--yellow);color:var(--blue);}

/* ── LAYOUT ── */
#app{display:flex;height:calc(100vh - 48px);}

/* ── LABYRINTHE ── */
#maze-wrap{
  flex:0 0 auto;
  background:#030912;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}
#maze-canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
/* Flèches directionnelles */
#dpad{
  position:absolute;bottom:8px;right:8px;
  display:grid;grid-template-columns:repeat(3,32px);grid-template-rows:repeat(2,32px);
  gap:3px;
}
.dp{
  width:32px;height:32px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:6px;color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;transition:background .1s;
}
.dp:active{background:rgba(255,255,255,.3);}
.dp.empty{background:transparent;border:none;pointer-events:none;}

/* ── PANNEAU DROIT ── */
#panel{
  flex:1;overflow-y:auto;
  background:#f0f5ff;
  padding:12px;
  display:flex;flex-direction:column;gap:10px;
  min-width:280px;
}

/* INSTRUCTIONS */
.instr{
  background:linear-gradient(135deg,#003087,#0050c8);
  border-radius:12px;padding:14px;color:#fff;
}
.instr h3{font-family:'Fredoka One',cursive;color:var(--yellow);font-size:16px;margin-bottom:7px;}
.instr p{font-size:12.5px;line-height:1.6;color:rgba(255,255,255,.85);margin-bottom:5px;}
.keys{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.key{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;}

/* MINI-CARTE QUESTIONS */
.quest-map{
  background:#fff;border-radius:12px;padding:12px;
  box-shadow:0 2px 10px rgba(0,48,135,.08);
}
.quest-map h4{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.qm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.qm-item{
  background:#f5f8ff;border:1.5px solid #dde5ff;
  border-radius:7px;padding:4px;text-align:center;
  font-size:10px;font-weight:700;color:#374151;
  transition:all .2s;
}
.qm-item.done{background:#f0fdf4;border-color:#86efac;color:#14532d;}
.qm-item.fail{background:#fff1f0;border-color:#fca5a5;color:#7f1d1d;}
.qm-item.active{background:#fef9c3;border-color:#fde047;color:#713f12;transform:scale(1.05);}

/* QUESTION CARD */
.q-card{
  background:#fff;border-radius:13px;
  box-shadow:0 3px 16px rgba(0,48,135,.12);
  overflow:hidden;animation:popIn .3s ease;
}
@keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-top{padding:11px 15px;display:flex;align-items:center;gap:9px;}
.q-badge{background:var(--yellow);color:var(--blue);font-family:'Fredoka One',cursive;font-size:11px;padding:2px 10px;border-radius:20px;white-space:nowrap;}
.q-lieu{font-family:'Fredoka One',cursive;font-size:15px;color:#fff;}
.q-sit{background:#f5f9ff;border-left:4px solid var(--blue);padding:9px 13px;margin:2px 13px 9px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;}
.q-cli{display:flex;gap:8px;margin:0 13px 10px;align-items:flex-start;}
.q-av{font-size:28px;flex-shrink:0;}
.q-bub{background:#fff;border:2px solid #dde5ff;border-radius:10px;padding:7px 11px;font-size:13px;font-style:italic;color:#374151;flex:1;position:relative;}
.q-bub::before{content:'';position:absolute;left:-8px;top:10px;border:6px solid transparent;border-right-color:#dde5ff;}
.q-hint{font-size:12px;font-weight:700;color:#6b7280;padding:0 13px 6px;}
.q-label{font-size:13.5px;font-weight:800;color:var(--blue);padding:0 13px 7px;}
.choices{padding:0 13px 13px;display:flex;flex-direction:column;gap:7px;}
.cbtn{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px;border:2.5px solid #e5e7eb;border-radius:10px;
  background:#fff;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;text-align:left;
  transition:all .18s;
}
.cbtn:hover:not(.dis){border-color:var(--blue);background:#eff6ff;transform:translateX(3px);}
.cbtn .ci{font-size:20px;flex-shrink:0;}
.cbtn.ok{border-color:var(--green)!important;background:#f0fdf4;color:#14532d;}
.cbtn.bad{border-color:var(--red)!important;background:#fff1f0;color:#7f1d1d;}
.cbtn.dis{pointer-events:none;}
.cbtn.dis:not(.ok):not(.bad){opacity:.3;}
.fb{display:none;margin:0 13px 11px;border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.6;}
.fb.show{display:block;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb.ok{background:#f0fdf4;border:2px solid var(--green);}
.fb.bad{background:#fff1f0;border:2px solid var(--red);}
.ft{font-weight:800;font-size:13px;margin-bottom:4px;}
.fb.ok .ft{color:var(--green);}
.fb.bad .ft{color:var(--red);}
.frule{margin-top:6px;padding:7px 9px;border-radius:7px;background:rgba(255,255,255,.8);font-size:12px;border-left:3px solid currentColor;}

/* IMPASSE */
.dead-card{
  background:#fff;border-radius:13px;padding:15px;text-align:center;
  border:3px solid var(--red);animation:popIn .3s;
}
.dead-card h3{font-family:'Fredoka One',cursive;color:var(--red);font-size:16px;margin-bottom:5px;}
.dead-card p{font-size:12.5px;color:#6b7280;line-height:1.5;margin-bottom:9px;}
.dead-rule{background:#fff1f0;border:2px solid var(--red);border-radius:8px;padding:8px 11px;font-size:12.5px;font-weight:700;color:#7f1d1d;margin-bottom:11px;}
.retry-btn{padding:9px 20px;background:#f59e0b;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:13px;transition:all .2s;}
.retry-btn:hover{background:#d97706;}

/* NEXT */
.nxt{display:none;margin:0 13px 13px;padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:14px;box-shadow:0 3px 10px rgba(0,48,135,.25);transition:all .2s;width:fit-content;}
.nxt:hover{background:#0050c8;transform:translateY(-1px);}
.nxt.show{display:block;}

/* FIN */
.end-card{background:#fff;border-radius:13px;padding:22px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:popIn .5s;}
.end-card h2{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:5px;}
.end-card.win h2{color:var(--green);}
.end-card.lose h2{color:#f59e0b;}
.end-score{display:inline-block;background:var(--yellow);color:var(--blue);font-weight:800;font-size:14px;padding:5px 18px;border-radius:20px;margin:7px 0 12px;}
.end-msg{font-size:13px;color:#6b7280;line-height:1.6;max-width:360px;margin:0 auto 14px;}
.end-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn-r{padding:9px 18px;background:var(--blue);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:13px;}
.btn-p{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:13px;}

/* SYNTHESE */
.synth{background:#fff;border-radius:13px;overflow:hidden;box-shadow:0 2px 12px rgba(0,48,135,.08);}
.sh{background:var(--blue);color:#fff;padding:11px 16px;font-family:'Fredoka One',cursive;font-size:16px;}
.sb{padding:13px 15px;}
.srow{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f3f4f6;}
.srow:last-child{border-bottom:none;}
.snum{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;}
.snum.ok{background:var(--green);}
.snum.bad{background:var(--red);}
.sc strong{font-size:12.5px;display:block;margin-bottom:1px;}
.sc p{font-size:11.5px;color:#6b7280;line-height:1.4;}
.sc .sr{font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px;}
.sc .st{font-size:10.5px;color:#f59e0b;font-weight:700;}

@media print{body,html{overflow:visible!important;height:auto!important;}#hdr,#app{display:none!important;}#pz{display:block!important;}}
#pz{display:none;}
</style>
</head>

// ═══════════════════════════════════════════
// CANVAS & RENDU
// ═══════════════════════════════════════════
const cv = document.getElementById('maze-canvas');
const ctx = cv.getContext('2d');
let CELL = 10;

const COLORS = {
  wall:   '#050d1f',
  wallHL: '#0a1c3a',  // highlight mur
  floor:  '#1a2d52',
  floorBright: '#dce8ff',
  visited:'#7cb9e8',
  good:   '#4ade80',
  bad:    '#f87171',
  start:  '#f7c800',
  end:    '#16a34a',
  hotspot:'#a5f3fc',
  hotspotDone:'#4ade80',
  hotspotActive:'#fef08a',
  char:   '#fef08a',
};

// Overlay couleurs
const OV = Array.from({length:GH},()=>Array(GW).fill(null));

function sizeCanvas(){
  const wrap = document.getElementById('maze-wrap');
  const aw = wrap.clientWidth - 4;
  const ah = wrap.clientHeight - 4;
  CELL = Math.max(5, Math.min(18, Math.floor(Math.min(aw/GW, ah/GH))));
  cv.width  = GW * CELL;
  cv.height = GH * CELL;
  wrap.style.width = cv.width + 'px';
}

function drawMaze(){
  // Fond
  ctx.fillStyle = COLORS.wall;
  ctx.fillRect(0,0,cv.width,cv.height);

  for(let r=0;r<GH;r++){
    for(let c=0;c<GW;c++){
      const v = GRID_ROWS[r][c];
      if(v==='0'){
        // Mur avec texture légère
        ctx.fillStyle = COLORS.wall;
        ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
        if(CELL>=8){
          ctx.fillStyle='rgba(255,255,255,.025)';
          ctx.fillRect(c*CELL, r*CELL, CELL>>1, CELL>>1);
        }
        continue;
      }
      // Sol
      const ov = OV[r][c];
      ctx.fillStyle = ov || COLORS.floor;
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
      // Grille subtile
      if(CELL>=9){
        ctx.strokeStyle='rgba(0,48,135,.1)';
        ctx.lineWidth=.5;
        ctx.strokeRect(c*CELL+.5,r*CELL+.5,CELL-1,CELL-1);
      }
    }
  }
  // Départ / Arrivée
  drawSpecial(START[0],START[1],'🚀');
  drawSpecial(END[0],END[1],'🏁');
  // Hotspots
  HOTSPOTS.forEach(h=>{
    const done = qDone[h.step];
    const active = activeQ===h.step;
    OV[h.r][h.c] = active ? COLORS.hotspotActive : done ? COLORS.hotspotDone : COLORS.hotspot;
    ctx.fillStyle=OV[h.r][h.c];
    ctx.fillRect(h.c*CELL,h.r*CELL,CELL,CELL);
    if(CELL>=9){
      const icons=['🚪','🗺️','🥩','❄️','🛒','🏷️','💳','🗣️','📦','🪧','📢','🚗'];
      ctx.font=`${Math.max(7,Math.floor(CELL*.65))}px serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(done?'✅':icons[h.step], h.c*CELL+CELL/2, h.r*CELL+CELL/2+1);
    }
  });
  drawChar();
}

function drawSpecial(r,c,icon){
  if(CELL>=8){
    ctx.font=`${Math.max(7,Math.floor(CELL*.7))}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icon, c*CELL+CELL/2, r*CELL+CELL/2+1);
  }
}

function drawChar(){
  const x=charC*CELL+CELL/2, y=charR*CELL+CELL/2;
  // Halo
  const g=ctx.createRadialGradient(x,y,1,x,y,CELL*.9);
  g.addColorStop(0,'rgba(254,240,138,.9)');
  g.addColorStop(1,'rgba(254,240,138,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,CELL*.9,0,Math.PI*2);ctx.fill();
  // Personnage
  ctx.font=`${Math.max(8,Math.floor(CELL*.8))}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🧑‍💼',x,y+1);
}

// Scroll pour garder le personnage visible
function scrollToChar(){
  const wrap=document.getElementById('maze-wrap');
  const px=charC*CELL, py=charR*CELL;
  const tw=wrap.clientWidth, th=wrap.clientHeight;
  // Centre le personnage si le canvas est plus grand
  if(cv.width>tw) wrap.scrollLeft=Math.max(0,px-tw/2+CELL/2);
  if(cv.height>th) wrap.scrollTop=Math.max(0,py-th/2+CELL/2);
}

// ═══════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════
let charR=START[0], charC=START[1];
let activeQ=-1;           // question active
let qDone={};             // stepIdx → {tries,ok}
let history=[];
let score=0, timer=0, gameOver=false;
let stepsOk=0;

let timerInt=setInterval(()=>{
  timer++;
  const m=String(Math.floor(timer/60)).padStart(2,'0');
  const s=String(timer%60).padStart(2,'0');
  document.getElementById('t-disp').textContent='⏱ '+m+':'+s;
},1000);

// ═══════════════════════════════════════════
// MOUVEMENT
// ═══════════════════════════════════════════
function mv(dr,dc){
  if(gameOver||activeQ>=0) return;
  const nr=charR+dr, nc=charC+dc;
  if(!isOpen(nr,nc)) return;
  // Laisser une trace "visité" discrète
  if(OV[charR][charC]===null) OV[charR][charC]='#1e3a6e';
  charR=nr; charC=nc;
  drawMaze();
  scrollToChar();
  // Hotspot ?
  const hsKey=charR+','+charC;
  if(hsKey in HS_MAP){
    const idx=HS_MAP[hsKey];
    if(!qDone[idx]?.ok){
      activeQ=idx;
      renderQuestion(idx,false);
    }
  }
  // Arrivée ?
  if(charR===END[0]&&charC===END[1]&&stepsOk>=QUESTIONS.length){
    setTimeout(showEnd,500);
  }
}

// Clavier
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='ArrowUp'||k==='z'||k==='Z'){e.preventDefault();mv(-1,0);}
  else if(k==='ArrowDown'||k==='s'||k==='S'){e.preventDefault();mv(1,0);}
  else if(k==='ArrowLeft'||k==='q'||k==='Q'){e.preventDefault();mv(0,-1);}
  else if(k==='ArrowRight'||k==='d'||k==='D'){e.preventDefault();mv(0,1);}
});

// Touch swipe
let tx0=0,ty0=0;
cv.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)){mv(0,dx>0?1:-1);}
  else{mv(dy>0?1:-1,0);}
},{passive:true});

function renderQuestion(idx,retry){
  const q=QUESTIONS[idx];
  const gc=document.getElementById('gc');
  gc.innerHTML='';
  // Progression
  const pb=document.createElement('div');
  pb.style.cssText='margin-bottom:8px;';
  pb.innerHTML='<div style="background:#e0e7ff;border-radius:20px;height:7px;overflow:hidden;">'
    +'<div style="height:100%;background:linear-gradient(90deg,#f7c800,#e5002b);border-radius:20px;width:'+(stepsOk/QUESTIONS.length*100)+'%;transition:width .5s;"></div></div>'
    +'<div style="font-size:11px;font-weight:800;color:#6b7280;margin-top:3px;">'+stepsOk+' / '+QUESTIONS.length+' zones réussies</div>';
  gc.appendChild(pb);
  // Card question
  const card=document.createElement('div');
  card.className='q-card';
  const top=document.createElement('div');
  top.className='q-top';
  top.style.background=q.bg;
  top.innerHTML='<span class="q-badge">'+(retry?'🔄 Réessaie !':'Zone '+q.id+' / '+QUESTIONS.length)+'</span>'
    +'<span class="q-lieu">'+q.lieu+'</span>';
  card.appendChild(top);
  const sit=document.createElement('div');
  sit.className='q-sit';sit.style.marginTop='10px';
  sit.innerHTML='<strong>📋 Situation :</strong> '+q.sit;
  card.appendChild(sit);
  const cli=document.createElement('div');
  cli.className='q-cli';
  cli.innerHTML='<div class="q-av">'+q.av+'</div><div class="q-bub">'+q.dg+'</div>';
  card.appendChild(cli);
  const hint=document.createElement('div');
  hint.className='q-hint';hint.textContent=q.hint;
  card.appendChild(hint);
  const ql=document.createElement('p');
  ql.className='q-label';ql.textContent='❓ '+q.q;
  card.appendChild(ql);
  const cd=document.createElement('div');cd.className='choices';
  q.choix.forEach((ch,ci)=>{
    const btn=document.createElement('button');
    btn.className='cbtn';
    btn.innerHTML='<span class="ci">'+ch.icon+'</span><span>'+ch.txt+'</span>';
    btn.onclick=()=>handleAnswer(idx,ci);
    cd.appendChild(btn);
  });
  card.appendChild(cd);
  const fb=document.createElement('div');fb.className='fb';fb.id='fbbox';
  card.appendChild(fb);
  const nb=document.createElement('button');nb.className='nxt';nb.id='nxtbtn';
  nb.textContent='▶ Continuer à explorer';nb.onclick=continueQ;
  card.appendChild(nb);
  gc.appendChild(card);
  renderQMap();
  document.getElementById('panel').scrollTo({top:0,behavior:'smooth'});
}

function handleAnswer(idx,ci){
  const q=QUESTIONS[idx];
  const ch=q.choix[ci];
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.add('dis'));
  const rec=qDone[idx]||{tries:0,ok:false};
  rec.tries++;
  qDone[idx]=rec;

  if(ch.ok){
    document.querySelectorAll('.cbtn')[ci].classList.add('ok');
    const pts=rec.tries===1?15:8;
    score+=pts;rec.ok=true;stepsOk++;
    document.getElementById('s-disp').textContent='⭐ '+score+' pt'+(score>1?'s':'');
    document.getElementById('e-disp').textContent=stepsOk+'/'+QUESTIONS.length+' zones';
    // Case hotspot → vert
    OV[HOTSPOTS[idx].r][HOTSPOTS[idx].c]=COLORS.hotspotDone;
    if(!history.find(h=>h.id===q.id))
      history.push({id:q.id,lieu:q.lieu,ok:true,tries:rec.tries,txt:ch.txt,rule:ch.rule});
    else{const e=history.find(h=>h.id===q.id);e.ok=true;e.tries=rec.tries;e.txt=ch.txt;}
    const fb=document.getElementById('fbbox');
    fb.className='fb ok show';
    fb.innerHTML='<div class="ft">'+ch.ft+' <span style="font-size:11px;font-weight:700;color:#16a34a;">(+'+(pts)+' pts)</span></div><div>'+ch.fb+'</div><div class="frule">'+ch.rule+'</div>';
    document.getElementById('nxtbtn').className='nxt show';
    drawMaze();
  } else {
    document.querySelectorAll('.cbtn')[ci].classList.add('bad');
    q.choix.forEach((c2,i)=>{if(c2.ok)document.querySelectorAll('.cbtn')[i].classList.add('ok');});
    OV[HOTSPOTS[idx].r][HOTSPOTS[idx].c]='#fca5a5';
    if(!history.find(h=>h.id===q.id))
      history.push({id:q.id,lieu:q.lieu,ok:false,tries:rec.tries,txt:ch.txt,rule:ch.rule});
    const fb=document.getElementById('fbbox');
    fb.className='fb bad show';
    fb.innerHTML='<div class="ft">'+ch.ft+'</div><div>'+ch.fb+'</div><div class="frule">'+ch.rule+'</div>';
    drawMaze();
    setTimeout(()=>showDeadBox(idx,ch),400);
  }
}

function showDeadBox(idx,ch){
  const q=QUESTIONS[idx];
  const gc=document.getElementById('gc');
  const db=document.createElement('div');
  db.className='dead-card';db.id='deadbox';
  const good=q.choix.find(c=>c.ok);
  db.innerHTML='<div style="font-size:36px;margin-bottom:6px;">🔄</div>'
    +'<h3>Fausse piste ! Rebrousse chemin.</h3>'
    +'<p>Tu peux rebrousser chemin librement dans le labyrinthe, relire la règle, puis revenir sur cette case pour réessayer.</p>'
    +'<div class="dead-rule">'+good.rule+'</div>'
    +'<button class="retry-btn" onclick="retryQ('+idx+')">🔄 Réessayer tout de suite</button>';
  gc.appendChild(db);
}

function retryQ(idx){
  OV[HOTSPOTS[idx].r][HOTSPOTS[idx].c]=COLORS.hotspotActive;
  drawMaze();
  const db=document.getElementById('deadbox');if(db)db.remove();
  renderQuestion(idx,true);
}

function continueQ(){
  activeQ=-1;
  renderIdle();
}

function renderQMap(){
  const gc=document.getElementById('gc');
  const old=document.getElementById('qmap');if(old)old.remove();
  const qm=document.createElement('div');qm.className='quest-map';qm.id='qmap';
  qm.innerHTML='<h4>Zones à trouver dans le labyrinthe</h4>';
  const gr=document.createElement('div');gr.className='qm-grid';
  const icons=['🚪','🗺️','🥩','❄️','🛒','🏷️','💳','🗣️','📦','🪧','📢','🚗'];
  QUESTIONS.forEach((q,i)=>{
    const done=qDone[i]?.ok;
    const tried=qDone[i]&&!done;
    const act=activeQ===i;
    const item=document.createElement('div');
    item.className='qm-item'+(done?' done':tried?' fail':act?' active':'');
    item.textContent=(done?'✅':tried?'❌':'')+icons[i]+' '+q.id;
    item.title=q.lieu;
    gr.appendChild(item);
  });
  qm.appendChild(gr);
  gc.appendChild(qm);
}

// ═══════════════════════════════════════════
// FIN
// ═══════════════════════════════════════════
function showEnd(){
  if(gameOver)return;
  gameOver=true;
  clearInterval(timerInt);
  const good=Object.values(qDone).filter(q=>q.ok).length;
  const win=good>=Math.ceil(QUESTIONS.length*.7);
  const mm=String(Math.floor(timer/60)).padStart(2,'0');
  const ss=String(timer%60).padStart(2,'0');
  const gc=document.getElementById('gc');gc.innerHTML='';
  const ec=document.createElement('div');
  ec.className='end-card '+(win?'win':'lose');
  ec.innerHTML='<div style="font-size:52px;margin-bottom:7px;">'+(win?'😊🛒🎉':'😕🛒')+'</div>'
    +'<h2>'+(win?'Sortie réussie ! Client heureux !':'Tu t\'es un peu perdu…')+'</h2>'
    +'<div class="end-score">⭐ '+score+' pts — '+good+'/'+QUESTIONS.length+' réussies — ⏱ '+mm+':'+ss+'</div>'
    +'<p class="end-msg">'+(win?'Bravo ! Tu as parcouru tout le labyrinthe et géré chaque situation. Tu maîtrises l\'accueil en hypermarché !':'Consulte ta fiche bilan, retiens les règles, et rejoue !')+'</p>'
    +'<div class="end-btns"><button class="btn-p" onclick="showSynthese()">📋 Ma fiche bilan</button>'
    +'<button class="btn-r" onclick="doRestart()">🔄 Rejouer</button></div>';
  gc.appendChild(ec);
}

// ═══════════════════════════════════════════
// SYNTHESE IMPRIMABLE
// ═══════════════════════════════════════════
function showSynthese(){
  const good=Object.values(qDone).filter(q=>q.ok).length;
  const win=good>=Math.ceil(QUESTIONS.length*.7);
  const mm=String(Math.floor(timer/60)).padStart(2,'0');
  const ss=String(timer%60).padStart(2,'0');
  const gc=document.getElementById('gc');
  const sy=document.createElement('div');sy.className='synth';
  let h='<div class="sh">📋 Ma fiche bilan — Le Labyrinthe Carrefour</div><div class="sb">';
  h+='<div style="background:#f5f8ff;border-radius:8px;padding:9px 12px;margin-bottom:11px;">'
    +'<p style="font-size:10px;color:#6b7280;margin-bottom:2px;">CAP EPC – Accueil & Orientation en hypermarché</p>'
    +'<p style="font-weight:800;font-size:12px;color:#003087;">Prénom / Nom : _______________________ &nbsp;&nbsp; Date : ___________</p>'
    +'<p style="font-size:11px;margin-top:5px;">Score : <strong>'+score+' pts</strong> &nbsp;|&nbsp; '+good+'/'+QUESTIONS.length
    +' réussies &nbsp;|&nbsp; ⏱ '+mm+':'+ss+' &nbsp;|&nbsp; '+(win?'😊 Sortie réussie !':'😕 À rejouer')+'</p></div>';
  h+='<p style="font-size:10px;font-weight:800;color:#003087;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;">Résultats par zone</p>';
  QUESTIONS.forEach((q,i)=>{
    const rec=qDone[i];
    const ent=history.find(e=>e.id===q.id);
    const ok=rec?.ok;
    h+='<div class="srow"><div class="snum '+(ok?'ok':'bad')+'">'+q.id+'</div><div class="sc">'
      +'<strong>'+q.lieu+'</strong>'
      +(ent?'<p>Réponse : '+ent.txt+'</p>':'<p style="color:#f59e0b;font-weight:700;">⚠️ Zone non trouvée</p>')
      +(rec?.tries>1?'<p class="st">'+rec.tries+' essais</p>':'')
      +(ent?'<p class="sr">'+ent.rule+'</p>':'')
      +'</div></div>';
  });
  const rules=[
    "Ne jamais porter les affaires d'un client — proposer un chariot ou un diable.",
    "Accompagner le client jusqu'au rayon OU donner l'allée précise + un repère visuel.",
    "Si tu ne sais pas répondre, trouver quelqu'un qui sait — ne jamais laisser sans réponse.",
    "DLC/DDM : respecter la réglementation alimentaire — aucun compromis.",
    "Rupture de stock : vérifier en réserve + proposer une alternative.",
    "Conflit de prix : appliquer le prix le plus bas affiché (Code de la consommation).",
    "Personnes âgées / handicapées / femmes enceintes → caisse prioritaire.",
    "Client bavard : écouter brièvement + recentrer avec une question fermée.",
    "Garantie légale de conformité : 2 ans même sans ticket (CB ou fidélité = preuve).",
    "Prix non affiché = signaler immédiatement au responsable rayon.",
    "Client agressif : écouter + rester calme + escalader vers le responsable.",
    "Soigner la sortie du client = dernière impression = fidélisation.",
  ];
  h+='<div style="margin-top:11px;padding-top:10px;border-top:2px solid #e5e7eb;">'
    +'<p style="font-size:10px;font-weight:800;color:#003087;margin-bottom:7px;">📌 Les 12 règles professionnelles à retenir</p>';
  rules.forEach((r,i)=>{
    h+='<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:5px;">'
      +'<div style="min-width:17px;height:17px;border-radius:50%;background:#003087;color:white;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;">'+(i+1)+'</div>'
      +'<p style="font-size:11px;line-height:1.45;">'+r+'</p></div>';
  });
  h+='</div></div><div style="padding:0 15px 15px;display:flex;gap:7px;flex-wrap:wrap;">'
    +'<button class="btn-p" onclick="window.print()">🖨️ Imprimer ma fiche</button>'
    +'<button class="btn-r" onclick="doRestart()">🔄 Rejouer</button></div>';
  sy.innerHTML=h;
  gc.appendChild(sy);
  document.getElementById('pz').innerHTML=h;
}

// ═══════════════════════════════════════════
// RESTART
// ═══════════════════════════════════════════
function doRestart(){
  charR=START[0];charC=START[1];
  activeQ=-1;qDone={};history=[];score=0;timer=0;gameOver=false;stepsOk=0;
  for(let r=0;r<GH;r++)for(let c=0;c<GW;c++)OV[r][c]=null;
  document.getElementById('s-disp').textContent='⭐ 0 pt';
  document.getElementById('e-disp').textContent='0/'+QUESTIONS.length+' zones';
  clearInterval(timerInt);
  timerInt=setInterval(()=>{timer++;const m=String(Math.floor(timer/60)).padStart(2,'0');const s=String(timer%60).padStart(2,'0');document.getElementById('t-disp').textContent='⏱ '+m+':'+s;},1000);
  sizeCanvas();drawMaze();renderIdle();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('resize',()=>{sizeCanvas();drawMaze();});
sizeCanvas();
drawMaze();
renderIdle();
</script>
